name: Auto PR - Staging to Main

on:
  workflow_run:
    workflows: ["CI - Staging"]
    types:
      - completed

permissions:
  contents: read
  pull-requests: write

jobs:
  create-pr:
    if: >
      ${{
        github.event.workflow_run.conclusion == 'success' &&
        github.event.workflow_run.head_branch == 'staging' &&
        github.event.workflow_run.event == 'push'
      }}
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
      
      - name: Create PR if needed
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          COMMITS=$(gh api \
            repos/${{ github.repository }}/compare/main...staging \
            --jq '.total_commits')

          if [ "$COMMITS" -eq 0 ]; then
            echo "No differences between staging and main"
            exit 0
          fi
          
          EXISTING_PR=$(gh pr list \
              --base main \
              --head staging \
              --json number \
              --jq 'length')

            if [ "$EXISTING_PR" -eq 0 ]; then
              gh pr create \
                --base main \
                --head staging \
                --title "Promote staging → main" \
                --body "Automatic promotion after successful CI." \
                --label "automated" \
                --label "promote"
            else
              echo "PR already exists"
            fi