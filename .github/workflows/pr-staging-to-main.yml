name: Auto PR - Staging to Main

on:
  push:
    branches: [staging]

permissions:
  contents: read
  pull-requests: write
  actions: read

jobs:
  create-pr:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Create PR if needed
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          set -e
          COMMITS=$(gh api \
            repos/${{ github.repository }}/compare/main...staging \
            --jq '.ahead_by')

          if [ "$COMMITS" -eq 0 ]; then
            echo "No differences between staging and main"
            exit 0
          fi

          COMMIT_MSG=$(git log -1 --pretty=%B)
          PR_NUMBER=$(gh pr list \
            --base main \
            --head staging \
            --json number \
            --jq '.[0].number')

          if [ -z "$PR_NUMBER" ]; then
            gh pr create \
              --base main \
              --head staging \
              --title "Promote staging → main" \
              --body "Automatic promotion after successful CI.
          Commit:
          $GITHUB_SHA
          https://github.com/${{ github.repository }}/commit/$GITHUB_SHA
          Message:
          $COMMIT_MSG" \
              --label "automated" \
              --label "promote"

            PR_NUMBER=$(gh pr list \
              --base main \
              --head staging \
              --json number \
              --jq '.[0].number')
          else
            echo "PR already exists"
          fi
          echo "PR number: $PR_NUMBER"
          echo "$GITHUB_SHA" > deployed_version.txt

      - name: Upload deployment info
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: deployed-version
          path: deployed_version.txt