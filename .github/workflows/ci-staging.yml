name: CI - Staging

on:
  push:
    branches: [ staging ]
  pull_request:
    branches: [ staging ]
  workflow_dispatch:  

permissions:
  contents: read
  security-events: write
  id-token: write
env:
  DB_PASSWORD: ${{ github.actor == 'dependabot[bot]' && 'postgres' || secrets.POSTGRES_PASSWORD }}

jobs:
  build-test-static-analysis:
    runs-on: ubuntu-24.04
    services:
      postgres:
        image: postgres:16
        ports:
          - 5432:5432
        env:
          POSTGRES_DB: flashcardsdb
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: ${{ github.actor == 'dependabot[bot]' && 'postgres' || secrets.POSTGRES_PASSWORD }}
          
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Set up JDK 17
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Cache Maven dependencies
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}

      - name: Make mvnw executable
        run: chmod +x mvnw

      - name: Check formatting (Spotless)
        run: ./mvnw spotless:check

      - name: Initialize CodeQL
        uses: github/codeql-action/init@95e58e9a2cdfd71adc6e0353d5c52f41a045d225
        with:
          languages: java

      - name: Wait for PostgreSQL
        run: |
          until pg_isready -h localhost -p 5432 -U postgres; do
            sleep 2
          done
      
      - name: Run Unit Tests
        env:
          SPRING_PROFILES_ACTIVE: test
        run: ./mvnw -B clean test
  
      - name: Run Integration Tests
        env:
          SPRING_PROFILES_ACTIVE: it
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/flashcardsdb
          SPRING_DATASOURCE_USERNAME: postgres
          SPRING_DATASOURCE_PASSWORD: ${{ github.actor == 'dependabot[bot]' && 'postgres' || secrets.POSTGRES_PASSWORD }}
        run: ./mvnw -B verify -DskipUnitTests=true
  
      - name: Verify Coverage 70%
        run: ./mvnw -B verify jacoco:report -Djacoco.minimum.coverage=0.70
  
      - name: Upload JaCoCo artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: jacoco-report
          path: |
            target/site/jacoco/index.html
            target/site/jacoco/jacoco.xml
  
      - name: Upload application JAR
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: app-jar
          path: target/*.jar
          if-no-files-found: error
  
      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@95e58e9a2cdfd71adc6e0353d5c52f41a045d225
  
      
      - name: Install Trivy (official repo)
        run: |
          sudo apt-get update
          sudo apt-get install -y wget gnupg lsb-release

          wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key | \
            gpg --dearmor | sudo tee /usr/share/keyrings/trivy.gpg > /dev/null

          echo "deb [signed-by=/usr/share/keyrings/trivy.gpg] https://aquasecurity.github.io/trivy-repo/deb $(lsb_release -sc) main" | \
            sudo tee /etc/apt/sources.list.d/trivy.list

          sudo apt-get update
          sudo apt-get install -y trivy=0.69.3

      - name: Run Trivy scan
        run: |
          trivy fs . \
            --severity HIGH,CRITICAL \
            --format table \
            --exit-code 0
            
  
  functional-tests:
    runs-on: ubuntu-24.04
    needs: build-test-static-analysis
    services:
      postgres:
        image: postgres:16
        ports:
          - 5432:5432
        env:
          POSTGRES_DB: flashcardsdb
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
        options: >
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      
      - name: Download application JAR
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          name: app-jar
          path: app-jar
      
      - name: Copy JAR to target
        run: |
          mkdir -p target
          cp app-jar/*.jar target/flashcards-v1.0.0.jar
      
      - name: Wait for PostgreSQL
        run: |
          until pg_isready -h localhost -p 5432 -U postgres; do
            sleep 2
          done

      - name: Install crane
        run: |
          curl -sL https://github.com/google/go-containerregistry/releases/latest/download/go-containerregistry_Linux_x86_64.tar.gz \
          | tar -xz crane
          sudo mv crane /usr/local/bin/

      - name: Check distroless digest
        id: digest
        run: |
          chmod +x ci-scripts/check-docker-image-latest.sh
          ci-scripts/check-docker-image-latest.sh

      - name: Debug digest
        run: echo "Digest changed = ${{ steps.digest.outputs.digest_changed }}"

      - name: Build Docker image
        run: docker build -t flashcards:staging .

      - name: Install Trivy (official repo)
        run: |
          sudo apt-get update
          sudo apt-get install -y wget gnupg lsb-release

          wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key | \
            gpg --dearmor | sudo tee /usr/share/keyrings/trivy.gpg > /dev/null

          echo "deb [signed-by=/usr/share/keyrings/trivy.gpg] https://aquasecurity.github.io/trivy-repo/deb $(lsb_release -sc) main" | \
            sudo tee /etc/apt/sources.list.d/trivy.list

          sudo apt-get update
          sudo apt-get install -y trivy=0.69.3

      - name: Scan Docker image (Trivy - conditional)
        run: |
          if [ "${{ steps.digest.outputs.digest_changed }}" = "true" ]; then
            echo "[INFO] New distroless → strict scan"
            trivy image flashcards:staging \
              --severity HIGH,CRITICAL \
              --ignorefile /dev/null \
              --exit-code 0 \
              --format table
          else
            echo "[INFO] Stable distroless → ignore known CVEs"
            trivy image flashcards:staging \
              --severity HIGH,CRITICAL \
              --ignorefile .trivyignore.yaml \
              --exit-code 0 \
              --format table
          fi

      - name: Run container
        run: >
          docker run -d --name flashcards-staging \
            --add-host=host.docker.internal:host-gateway \
            -p 8081:8081 \
            -e SPRING_PROFILES_ACTIVE=staging \
            -e SPRING_DATASOURCE_URL=jdbc:postgresql://host.docker.internal:5432/flashcardsdb \
            -e SPRING_DATASOURCE_USERNAME=postgres \
            -e SPRING_DATASOURCE_PASSWORD=${{ github.actor == 'dependabot[bot]' && 'postgres' || secrets.POSTGRES_PASSWORD }} \
            flashcards:staging

      - name: Wait for healthcheck
        run: |
          for i in {1..30}; do
            if curl -sf http://localhost:8081/actuator/health | grep UP > /dev/null; then
              echo "Container healthy"
              exit 0
            fi
            sleep 2
          done

          echo "Container failed to start"
          docker logs flashcards-staging
          exit 1

      - name: Set up Node.js (for Newman)
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: 20

      - name: Install Newman
        run: npm install -g newman

      - name: Run API Tests - Functional
        run: |
          newman run postman/flashcards.postman_collection.json \
            -e postman/local.postman_environment.json \
            --reporters cli,junit \
            --reporter-junit-export newman-functional.xml

      - name: Run API Tests - Error cases
        run: |
          newman run postman/flashcards_error_cases.postman_collection.json \
            -e postman/local.postman_environment.json \
            --reporters cli,junit \
            --reporter-junit-export newman-error.xml

      - name: Upload Newman reports
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: newman-reports
          path: |
            newman-functional.xml
            newman-error.xml
      
      - name: Save container logs
        if: always()
        run: |
          if docker ps -a --format '{{.Names}}' | grep -q flashcards-staging; then
            docker logs flashcards-staging > container.log
          else
            echo "Container not found" > container.log
          fi
      
      - name: Upload container logs
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: container-logs
          path: container.log
      
      - name: Stop container
        if: always()
        run: |
          docker stop flashcards-staging || true
          docker rm flashcards-staging || true
  
  load-test:
    runs-on: ubuntu-24.04
    needs: functional-tests
    if: github.event_name == 'push'
    services:
      postgres:
        image: postgres:16
        ports:
          - 5432:5432
        env:
          POSTGRES_DB: flashcardsdb
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: ${{ github.actor == 'dependabot[bot]' && 'postgres' || secrets.POSTGRES_PASSWORD }}
        options: >
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
  
      - name: Download application JAR
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          name: app-jar
          path: app-jar
  
      - name: Set up JDK 17
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654
        with:
          distribution: temurin
          java-version: 17
  
      - name: Start Spring Boot
        run:  |
           mkdir -p logs

            nohup java \
            -Dspring.datasource.url=jdbc:postgresql://localhost:5432/flashcardsdb \
            -Dspring.datasource.username=postgres \
            -Dspring.datasource.password=${{ github.actor == 'dependabot[bot]' && 'postgres' || secrets.POSTGRES_PASSWORD }} \
            -Dspring.profiles.active=staging \
            -Dserver.port=8081 \
            -jar $(ls app-jar/*.jar | head -n 1) \
            >> logs/spring.log 2>&1 &

            for i in {1..30}; do
              nc -z localhost 8081 && break
              sleep 2
            done
            nc -z localhost 8081 || exit 1

      - name: Install k6 (pinned)
        run: |
          K6_VERSION="0.49.0"

          sudo apt-get update
          sudo apt-get install -y wget gnupg

          wget -qO - https://dl.k6.io/key.gpg | \
            gpg --dearmor | \
            sudo tee /usr/share/keyrings/k6-archive-keyring.gpg > /dev/null

          echo "deb [signed-by=/usr/share/keyrings/k6-archive-keyring.gpg] \
            https://dl.k6.io/deb stable main" | \
            sudo tee /etc/apt/sources.list.d/k6.list

          sudo apt-get update

          if apt-cache madison k6 | grep -q "$K6_VERSION"; then
            sudo apt-get install -y k6=$K6_VERSION
          else
            echo "[ERROR] k6 version $K6_VERSION not found"
            apt-cache madison k6
            exit 1
          fi
  
      - name: Run k6 LOCAL (staging)
        env:
          BASE_URL: http://localhost:8081
        run: k6 run load-test/flashcards.js --vus 50 --duration 2m --out json=k6-report.json
  
      - name: Upload Spring Boot logs
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: spring-boot-logs-load-test
          path: logs/spring.log
          if-no-files-found: warn
  
      - name: Stop Spring Boot
        if: always()
        run: pkill -f 'java -jar' || true