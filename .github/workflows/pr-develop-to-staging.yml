name: Auto PR - Develop to Staging

on:
  push:
    branches: [ develop ]
    
permissions:
  contents: read
  pull-requests: write
  actions: read

jobs:
  create-pr:  
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
      
      - name: Create PR if needed
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          COMMITS=$(gh api \
            repos/${{ github.repository }}/compare/staging...develop \
            --jq '.total_commits')

          if [ "$COMMITS" -eq 0 ]; then
            echo "No differences between develop and staging"
            exit 0
          fi
          
          PR_NUMBER=$(gh pr list \
              --base staging \
              --head develop \
              --json number \
              --jq '.[0].number')

          if [ -z "$PR_NUMBER" ]; then
              gh pr create \
                --base staging \
                --head develop \
                --title "Promote develop → staging" \
                --body "Automatic promotion after successful CI." \
                --label "automated" \
                --label "promote"

              # Récupérer le numéro après création
              PR_NUMBER=$(gh pr list \
                  --base staging \
                  --head develop \
                  --json number \
                  --jq '.[0].number')
          else
              echo "PR already exists"
          fi

          echo "PR number: $PR_NUMBER"

          gh pr merge "$PR_NUMBER" \
            --auto \
            --merge